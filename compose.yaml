services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: "lms-benchmark/app"
        volumes:
            - ".:/var/www/html"
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    nginx:
        image: "nginx:alpine"
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - ".:/var/www/html"
            - "./docker/nginx.conf:/etc/nginx/conf.d/default.conf"
        networks:
            - sail
        depends_on:
            - app
        restart: unless-stopped

    mysql:
        image: "mysql/mysql-server:8.0"
        # Port MySQL TIDAK di-expose ke public — hanya accessible via Docker network internal
        # ports:
        #     - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
            MYSQL_ROOT_HOST: "%"
            MYSQL_DATABASE: "${DB_DATABASE}"
            MYSQL_USER: "${DB_USERNAME}"
            MYSQL_PASSWORD: "${DB_PASSWORD}"
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - "sail-mysql:/var/lib/mysql"
        networks:
            - sail
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
            retries: 5
            timeout: 5s
            interval: 10s
        restart: unless-stopped

    redis:
        image: "redis:7-alpine"
        # Port Redis TIDAK di-expose ke public — hanya accessible via Docker network internal
        # ports:
        #     - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - "sail-redis:/data"
        networks:
            - sail
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            retries: 3
            timeout: 5s
            interval: 10s
        restart: unless-stopped

networks:
    sail:
        driver: bridge

volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
